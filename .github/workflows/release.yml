# Publishes unofficial fork builds to this repo's Releases (not Obsidian's).
# Official releases: https://github.com/obsidianmd/obsidian-clipper/releases
name: Release (fork)

on:
  push:
    tags:
      # Same shape as upstream tags (e.g. 1.5.1), not v1.5.1 — see obsidianmd/obsidian-clipper releases
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      # Same as upstream: Chrome + Firefox + Safari extension zips (see webpack ZipPlugin)
      - run: npm run build

      - name: Stage release zips
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          zips=(builds/obsidian-web-clipper-bilibili-*.zip)
          if [ ${#zips[@]} -ne 3 ]; then
            echo "Expected exactly 3 browser zips (chrome, firefox, safari); found ${#zips[@]}"
            ls -la builds/ || true
            exit 1
          fi
          for browser in chrome firefox safari; do
            if ! printf '%s\n' "${zips[@]}" | grep -q -- "-${browser}.zip$"; then
              echo "Missing ${browser} zip in builds/"
              exit 1
            fi
          done
          for z in "${zips[@]}"; do
            cp "$z" "release-assets/$(basename "$z")"
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'bilibili-fork — ${{ github.ref_name }}（非官方）'
          body: |
            **本 Release 来自社区 fork，并非 Obsidian 官方发布。**

            - **本仓库：** https://github.com/${{ github.repository }}
            - **官方网页剪藏**（浏览器商店、支持与正式安装包）：[obsidian.md/clipper](https://obsidian.md/clipper) · [obsidianmd/obsidian-clipper Releases](https://github.com/obsidianmd/obsidian-clipper/releases)

            ---

            ### 与官方版的区别

            - 在 **哔哩哔哩** 视频页剪藏时，可从 B 站接口读取字幕/口播稿，写入模板变量 `{{transcript}}`。请先在 Obsidian Web Clipper 设置中 **导入模板**（仓库根目录的 `哔哩哔哩视频字幕剪藏模板.json`；在 GitHub 上打开该文件后可用右上角 **Raw** 下载再导入）。

            ### 附件说明

            - 共 **3** 个与官方结构一致的扩展包：**Chrome**、**Firefox**、**Safari**（均为 zip）。
            - 文件名为 **`obsidian-web-clipper-bilibili-<浏览器>.zip`**（`chrome` / `firefox` / `safari`），与官方 `obsidian-web-clipper-<版本>-<浏览器>.zip` 命名区分；**侧载使用风险自负**。
            - GitHub 会为该 tag 自动生成「Source code」源码压缩包。

            ### 安装说明（侧载）

            1. **下载** 对应 zip，例如 **`obsidian-web-clipper-bilibili-chrome.zip`**；Firefox、Safari 分别为 **`obsidian-web-clipper-bilibili-firefox.zip`**、**`obsidian-web-clipper-bilibili-safari.zip`**。
            2. **Chromium 系**（Chrome、Edge、Brave 等）  
               将 zip **解压**到任意文件夹。在地址栏打开 `chrome://extensions`（Edge 一般为 `edge://extensions`，Brave 多为 `brave://extensions`），打开右上角 **「开发者模式」** → **「加载已解压的扩展程序」** → 选择解压后的**文件夹**（不要直接把 zip 当文件夹加载）。
            3. **Firefox**  
               解压后打开 `about:debugging#/runtime/this-firefox` → **「临时载入附加组件」** → 选中解压目录里的 **`manifest.json`**。若需长期使用未签名扩展，请参阅本仓库 README 英文 **Developers** 小节或 Mozilla 文档。
            4. **Safari**  
               通常需配合 Xcode 工程安装与调试，请参阅本仓库 README 英文 **Developers** 中与 Safari / iOS Simulator 相关的说明。

            本地从源码构建、重新加载扩展等步骤见本仓库 **README**（中文说明在文首）。使用与排错亦可参考 [官方 Web Clipper 文档](https://help.obsidian.md/web-clipper)。

            ---

            _构建自 tag `${{ github.ref_name }}`，提交 `${{ github.sha }}`。_
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
